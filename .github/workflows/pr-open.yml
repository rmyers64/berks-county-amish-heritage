name: Build Pull request
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build sample

    steps:
      - uses: actions/checkout@v4

      - name: Build and verify the data-free static site
        run: docker build -f Dockerfile.static -t berks-static-pr .

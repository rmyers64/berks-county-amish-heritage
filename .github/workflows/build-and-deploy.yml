name: Verify main static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify the data-free static site
        env:
          EXPORT_MODE: static
          UNOPTIMIZED_IMAGES: "true"
          NEXT_PUBLIC_DISABLE_TINA_EDITING: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          TINA_SKIP_ADMIN_BUILD: "true"
          NODE_ENV: production
          NEXT_PUBLIC_TINA_CLIENT_ID: static-disabled
          TINA_TOKEN: static-disabled
          NEXT_PUBLIC_TINA_BRANCH: main
        run: |
          node scripts/skip-tina-admin-build.mjs
          find src/app/api -name route.ts -delete
          pnpm exec tinacms build --local --skip-cloud-checks --skip-search-index --no-client-build-cache --noTelemetry -c "next build"
          rm -rf out/admin
          pnpm exec pagefind --site out --output-path out/_pagefind || true
          node scripts/check-static-links.mjs out

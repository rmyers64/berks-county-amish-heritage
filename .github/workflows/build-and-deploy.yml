name: Deploy Next.js site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        run: touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Build and verify the data-free static site
        env:
          EXPORT_MODE: static
          UNOPTIMIZED_IMAGES: "true"
          NEXT_PUBLIC_DISABLE_TINA_EDITING: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          TINA_SKIP_ADMIN_BUILD: "true"
          NODE_ENV: production
          NEXT_PUBLIC_TINA_CLIENT_ID: static-disabled
          TINA_TOKEN: static-disabled
          NEXT_PUBLIC_TINA_BRANCH: main
        run: |
          node scripts/skip-tina-admin-build.mjs
          find src/app/api -name route.ts -delete
          pnpm exec tinacms build --local --skip-cloud-checks --skip-search-index --no-client-build-cache --noTelemetry -c "next build"
          rm -rf out/admin
          pnpm exec pagefind --site out --output-path out/_pagefind || true
          node scripts/check-static-links.mjs out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  search-tests:
    needs: build
    if: ${{ vars.SEARCH_TEST_BASE_URL != '' }}
    uses: ./.github/workflows/search-test.yml
    with:
      base_url: ${{ vars.SEARCH_TEST_BASE_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

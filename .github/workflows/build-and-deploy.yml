name: Deploy Next.js site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        run: touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Build and verify the data-free static site
        run: docker build -f Dockerfile.static -t berks-static-pages .

      - name: Extract static site
        run: |
          container=$(docker create berks-static-pages)
          mkdir -p out
          docker cp "${container}:/usr/share/caddy/." out
          docker rm "$container"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  search-tests:
    needs: build
    if: ${{ vars.SEARCH_TEST_BASE_URL != '' }}
    uses: ./.github/workflows/search-test.yml
    with:
      base_url: ${{ vars.SEARCH_TEST_BASE_URL }}
      NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
